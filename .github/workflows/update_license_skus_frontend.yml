name: Update License SKUs (Frontend)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-frontend-skus:
    if: github.repository_owner == 'Zacgoose'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download shared SKU update script
        id: download-script
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:RUNNER_TEMP 'Update-LicenseSKUFiles.ps1'
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/Zacgoose/CIPP-API/dev/Tools/Update-LicenseSKUFiles.ps1' -OutFile $scriptPath -ErrorAction Stop

          "script_path=$scriptPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Update frontend SKU files
        shell: pwsh
        run: |
          & "${{ steps.download-script.outputs.script_path }}" -Target frontend -FrontendRepoPath "${{ github.workspace }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update frontend license SKU files'
          title: 'chore: update frontend license SKU files'
          body: 'Automated weekly update of frontend Microsoft license SKU data.'
          branch: chore/update-frontend-license-skus
          base: dev
          delete-branch: true
          add-paths: src/data/*M365Licenses.json
